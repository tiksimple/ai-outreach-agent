<!DOCTYPE html>
<html>
<head>
<title>AI Cold DM Generator</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
background:#111;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h1{
margin-bottom:20px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

button{
width:95%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#result{
margin-top:20px;
background:#222;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Cold DM Generator</h1>

<input id="niche" placeholder="Enter niche">

<input id="offer" placeholder="Enter your offer">

<button onclick="generateDM()">Generate DM</button>

<p id="result"></p>

</div>

<script>

async function generateDM(){

let niche=document.getElementById("niche").value
let offer=document.getElementById("offer").value

let res=await fetch("/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({niche,offer})
})

let data=await res.json()

document.getElementById("result").innerText=data.result

}

</script>

</body>
</html>
